          - text: "1.4 Visualizing Data with Matplotlib"
            file: projects/uv/04-matplotlib-viz.qmd
          - text: "1.5 Real-World Data Analysis Project"
            file: projects/uv/05-complete-project.qmd
          - text: "1.6 Advanced Topics & Next Steps"
            file: projects/uv/06-advanced-uv.qmd
      - section: "🎮 Chapter 2: Pygame - Build Games"
