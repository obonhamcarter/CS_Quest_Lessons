[build]
  # Command to build your site
  command = "./build.sh"
  
  # Directory where your built site lives
  publish = "_site"

[build.environment]
  # Python version for JupyterLite
  PYTHON_VERSION = "3.11"

# Redirect rules (optional)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

[[plugins]]
package = "@quarto/netlify-plugin-quarto"
